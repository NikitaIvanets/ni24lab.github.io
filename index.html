<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ni24lab</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;

      display: flex;
      justify-content: center;
      align-items: center;

      background: #ffffff;
      cursor: none;
    }

    .main-img {
      width: 50%;
      max-width: 800px;
      height: auto;
      z-index: 1;
    }

    .cursor-img {
      position: fixed;
      width: 400px;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 999;
    }

    @media (max-width: 768px) {
      .main-img {
        width: 80%;
      }
      .cursor-img {
        display: none;
      }
      body {
        cursor: default;
      }
    }
  </style>
</head>

<body>

  <!-- основная картинка -->
  <img src="image.jpg" class="main-img">

  <!-- кастомный курсор -->
  <img src="image1.jpg" class="cursor-img" id="cursor">

  <script>
    const cursor = document.getElementById("cursor");

    let x = 0, y = 0;
    let targetX = 0, targetY = 0;

    document.addEventListener("mousemove", (e) => {
      targetX = e.clientX;
      targetY = e.clientY;
    });

    function animate() {
      x += (targetX - x) * 0.1;
      y += (targetY - y) * 0.1;

      cursor.style.left = x + "px";
      cursor.style.top = y + "px";

      requestAnimationFrame(animate);
    }

    animate();

    // переход по клику в любое место
    document.addEventListener("click", () => {
      window.location.href = "https://t.me/ni24lab";
    });
  </script>

</body>
</html>
