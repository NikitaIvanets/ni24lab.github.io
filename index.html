<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ni24lab</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;

      display: flex;
      justify-content: center;
      align-items: center;

      background: #ffffff;
      cursor: none;
    }

    .main-img {
      width: 50%;
      max-width: 800px;
      height: auto;
      z-index: 1;
    }

    .cursor-img {
      position: fixed;
      width: 100px;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 999;
    }

    /* экран с видео */
    .video-page {
      position: fixed;
      inset: 0;
      background: #BBBBBB;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .video-page.active {
      display: flex;
    }

    video {
      width: 80%;
      max-width: 900px;
      outline: none;
    }

    @media (max-width: 768px) {
      .main-img {
        width: 80%;
      }
      .cursor-img {
        display: none;
      }
      body {
        cursor: default;
      }
    }
  </style>
</head>

<body>

  <!-- главная картинка -->
  <img src="image.jpg" class="main-img">

  <!-- кастомный курсор -->
  <img src="image.jpg" class="cursor-img" id="cursor">

  <!-- видео-экран -->
  <div class="video-page" id="videoPage">
    <video id="video" src="0426 (1).mp4" autoplay></video>
  </div>

  <script>
    const cursor = document.getElementById("cursor");

    let x = 0, y = 0;
    let targetX = 0, targetY = 0;

    document.addEventListener("mousemove", (e) => {
      targetX = e.clientX;
      targetY = e.clientY;
    });

    function animate() {
      x += (targetX - x) * 0.1;
      y += (targetY - y) * 0.1;

      cursor.style.left = x + "px";
      cursor.style.top = y + "px";

      requestAnimationFrame(animate);
    }

    animate();

    const videoPage = document.getElementById("videoPage");
    const video = document.getElementById("video");

    // клик → показать видео-страницу
    document.addEventListener("click", () => {
      videoPage.classList.add("active");
      video.currentTime = 0;
      video.play();
    });

    // по окончании видео можно оставить экран или закрыть (по желанию)
    video.addEventListener("ended", () => {
      // например, просто остановить на последнем кадре
      video.pause();
    });
  </script>

</body>
</html>
